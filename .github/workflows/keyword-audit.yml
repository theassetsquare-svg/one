name: Keyword Stuffing Audit (24h)
on:
  schedule:
    - cron: '15 4 * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Wait for CF Pages new deploy (ETag changes)
        run: |
          set -e
          # Wait for both: live + new build fingerprint (GeoCoordinates is in new build only)
          for i in $(seq 1 40); do
            S=$(curl -s -o /dev/null -w "%{http_code}" "https://one-5ei.pages.dev/")
            HAS_NEW=$(curl -s "https://one-5ei.pages.dev/" | grep -c "GeoCoordinates" || true)
            if [ "$S" = "200" ] && [ "$HAS_NEW" -gt 0 ]; then
              echo "✅ live with new build"; exit 0
            fi
            echo "wait... ($i/40) status=$S has_new=$HAS_NEW"
            sleep 15
          done
          exit 1
      - name: Run keyword stuffing audit
        run: node scripts/keyword-audit.js
